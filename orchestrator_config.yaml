# Configuracao principal do orquestrador

version: "2.0"

build:
  max_retries: 3
  build_timeout: 600  # segundos
  kotlin_version: "1.9.22"
  gradle_version: "7.4.2"
  compile_sdk: 34

ia:
  default_model: "bytedance/seed-oss-36b-instruct"
  fallback_models:
    - "abacusai/dracarys-llama-3.1-70b-instruct"
    - "meta/llama-3.1-8b-instruct"
  max_response_time: 90  # segundos

timeout:
  min_timeout: 30
  max_timeout: 300
  adaptive_enabled: true

knowledge_base:
  auto_learn: true
  max_solutions_per_error: 5
  min_confidence: 0.6

monitoring:
  adb_polling_pause: true
  progress_feedback: true
  log_level: "INFO"

dependencies:
  version_overrides:
    on_audio_query: "^2.9.0"
    just_audio: "^0.9.40"
