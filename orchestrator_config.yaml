build:
  build_timeout: 600
  compile_sdk: 34
  gradle_version: 7.4.2
  kotlin_version: 1.9.22
  max_retries: 3
dependencies:
  version_overrides:
    just_audio: ^0.9.40
    on_audio_query: ^2.9.0
ia:
  default_model: meta/llama-3.1-70b-instruct
  fallback_models:
  - abacusai/dracarys-llama-3.1-70b-instruct
  - meta/llama-3.1-8b-instruct
  max_response_time: 120
  min_response_length: 100
  preferred_models:
  - meta/llama-3.1-70b-instruct
  - bytedance/seed-oss-36b-instruct
  prompt:
    force_code_block: true
    include_code_context: true
    include_full_error: true
    max_code_lines: 500
knowledge_base:
  auto_learn: true
  min_confidence: 0.5
  prefer_local_fixes: true
local_fixes:
  dependency_fixer: true
  enabled: true
  import_fixer: true
  kotlin_fixer: true
monitoring:
  adb_polling_pause: true
  log_level: INFO
  progress_feedback: true
timeout:
  adaptive_enabled: true
  initial_timeout: 120
  learning_rate: 0.6
  max_timeout: 180
  min_timeout: 60
version: '2.1'
