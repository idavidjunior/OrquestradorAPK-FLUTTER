name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
        shell: pwsh
      - name: Lint with ruff
        run: ruff check --output-format=github .
      - name: Test with pytest
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML
      - name: Verify orchestrator imports
        run: python -c "from flutter_orchestrator import FlutterBuildOrchestrator; print('CLI OK')"
      - name: Verify GUI module imports
        run: python -c "from gui.logger import Logger; print('GUI modules OK')"
      - name: Run smoke test
        run: python -m pytest tests/test_smoke.py -v
